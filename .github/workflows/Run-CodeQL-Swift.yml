name: Run CodeQL on Swift code

on:
    push:
        paths:
            - .github/workflows/Run-CodeQL-Swift.yml
            - Genius/**
            - Genius.xcodeproj/**
            - GeniusTests/**
    pull_request:
        paths:
            - .github/workflows/Build-Genius.yml
            - Genius/**
            - Genius.xcodeproj/**
            - GeniusTests/**
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    GH_TOKEN: ${{ github.token }}
    NSUnbufferedIO: YES

jobs:
    Run-CodeQL-Swift:
        name: Run CodeQL on Swift code
        runs-on: macos-15

        permissions:
            security-events: write

        steps:
            - name: Checkout
              uses: actions/checkout@main

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3.28.8
              with:
                languages: swift

            - name: Select Xcode Version
              uses: maxim-lobanov/setup-xcode@master
              with:
                xcode-version: latest

            - name: Install xcbeautify
              run: |
                latest_xcbeautify_tag=$(gh release --repo cpisciotta/xcbeautify list --json tagName --limit 1 | cut -d "\"" -f 4)
                curl --location https://github.com/cpisciotta/xcbeautify/releases/download/"$latest_xcbeautify_tag"/xcbeautify-"$latest_xcbeautify_tag"-arm64-apple-macosx.zip --output xcbeautify.zip
                unzip xcbeautify.zip
                echo "xcbeautify $(./xcbeautify --version) installed"
                
            - name: CodeQL hack
              run: |
                XCODE_PATH=$(xcode-select -p)
                mkdir -p $XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/lib
                cp $XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/host/*.dylib $XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/lib
                sudo mkdir -p /usr/local/lib
                sudo cp $XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/host/*.dylib /usr/local/lib

            - name: Build Genius
              run: |
                set -o pipefail
                xcodebuild build -scheme Genius -destination generic/platform=macOS -skipPackagePluginValidation # | ./xcbeautify --disable-logging --renderer github-actions

            - name: Run Tests
              run: |
                set -o pipefail
                xcodebuild test -scheme Genius -destination platform=macOS,arch=arm64 -skipPackagePluginValidation # | ./xcbeautify --disable-logging --renderer github-actions

            - name: Run CodeQL
              uses: github/codeql-action/analyze@v3.28.8
